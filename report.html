<!-- REPORT FORM -->

<section class="report-section">

<h1>🚨 Report A Problem</h1>

<p>
Facing any issue? Let us know.
</p>

<form id="reportForm">

<input
type="text"
id="customerName"
placeholder="Enter Your Name"
required>

<select id="problemType" required>

<option value="">
Select Problem Type
</option>

<option>
Order Not Delivered
</option>

<option>
Wrong Item Received
</option>

<option>
Payment Failed
</option>

<option>
Food Quality Issue
</option>

<option>
Other
</option>

</select>

<textarea
id="problemDescription"
placeholder="Describe Your Problem..."
required>
</textarea>

<button type="submit" class="btn">
Submit Report
</button>

</form>

</section>

<!-- SUCCESS POPUP -->

<div id="popup" class="success-popup">

<div class="success-box">

<div class="checkmark">
✓
</div>

<h2>
Report Submitted
</h2>

<p>
Thank you for your feedback ❤️
</p>

</div>

</div>

<script src="app.js"></script>
<script src="theme.js"></script>
<script src="report.js"></script>

</body>
